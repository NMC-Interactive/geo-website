name: Validate Site

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run validate:site
        env:
          SITE_URL: ${{ vars.SITE_URL }}
